<ion-grid>
  <ion-row>
    <ion-col size="12" size-md="6">
      <ion-item>
        <ion-label>Producto</ion-label>
        <ion-select [(ngModel)]="venta.id_producto" placeholder="Seleccionar">
          @for (p of productos; track p.id_producto) {
            <ion-select-option [value]="p.id_producto">{{ p.nombre_producto }}</ion-select-option>
          }
        </ion-select>
      </ion-item>
    </ion-col>

    <ion-col size="12" size-md="6">
      <ion-item>
        <ion-label position="floating">Precio unitario</ion-label>
        <ion-input type="number" [(ngModel)]="venta.precio_unitario"></ion-input>
      </ion-item>
    </ion-col>

    <ion-col size="12" size-md="6">
      <ion-item>
        <ion-label position="floating">Cantidad vendida</ion-label>
        <ion-input type="number" [(ngModel)]="venta.cantidad_vendida"></ion-input>
      </ion-item>
    </ion-col>

    <ion-col size="12" size-md="6">
      <ion-item>
        <ion-label position="floating">Fecha de venta</ion-label>
        <ion-input type="date" [(ngModel)]="venta.fecha_venta"></ion-input>
      </ion-item>
    </ion-col>

  </ion-row>

  <ion-row>
    <ion-col size="12">
      <ion-button expand="block" (click)="guardar()">
        Registrar venta
      </ion-button>
    </ion-col>
  </ion-row>
</ion-grid>
